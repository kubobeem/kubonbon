<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Frame | Post</title>
  <meta name="description" content="Read an article from Midnight Frame." />
  <meta property="og:title" content="Midnight Frame | Post" />
  <meta property="og:description" content="Read an article from Midnight Frame." />
  <meta property="og:type" content="article" />
  <meta name="theme-color" content="#0c111b" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="post">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-c" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="index.html" aria-label="Midnight Frame home">
        <span class="brand-mark">MF</span>
        <span class="brand-text">Midnight Frame</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="tags.html">Tags</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="wrap main-post">
    <section class="post-layout reveal" aria-live="polite">
      <article id="post-article" class="post-article">
        <a class="back-link" href="index.html">Back to all posts</a>
        <header class="post-head">
          <p id="post-meta" class="post-meta">Loading article...</p>
          <h1 id="post-title" class="post-title">Loading...</h1>
          <p id="post-excerpt" class="post-excerpt"></p>
          <div id="post-tags" class="tag-row"></div>
        </header>
        <div id="post-body" class="post-body"></div>
      </article>

      <aside class="post-side">
        <section class="side-panel">
          <h2>Related</h2>
          <ul id="related-posts" class="related-list"></ul>
        </section>
      </aside>
    </section>

    <section id="post-not-found" class="not-found hidden reveal">
      <h1>Post not found</h1>
      <p>The requested article is missing or the slug is invalid.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="index.html">Back home</a>
        <a class="btn btn-ghost" href="tags.html">Explore tags</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <p class="footer-brand">Midnight Frame</p>
      <p>Published on GitHub Pages <span id="year"></span></p>
    </div>
  </footer>

  <script src="main.js" defer></script>
</body>
</html>
