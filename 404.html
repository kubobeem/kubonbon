<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Frame | 404</title>
  <meta name="description" content="Page not found." />
  <meta name="theme-color" content="#0c111b" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="notfound">
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="wrap not-found-page reveal">
    <p class="hero-kicker">404</p>
    <h1 class="hero-title">The page vanished into the static void.</h1>
    <p class="hero-copy">The route may be wrong, or the file has not been published yet.</p>
    <div class="hero-actions">
      <a class="btn btn-primary" href="index.html">Go to homepage</a>
      <a class="btn btn-ghost" href="tags.html">Browse tags</a>
    </div>
  </main>

  <script src="main.js" defer></script>
</body>
</html>
